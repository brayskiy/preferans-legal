<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preferans — Android app</title>
  <meta name="description" content="Preferans — the classic Russian trick-taking card game, for Android.">
  <style>
    :root {
      --felt-900:#12301C; --felt-700:#1F4D2E; --felt-500:#2F7346;
      --gold:#C8A24B; --ivory:#F3ECD8; --ivory-dim:#C9C3B2; --red:#E0655C;
    }
    html, body {
      margin: 0; padding: 0;
      background: linear-gradient(180deg, var(--felt-900) 0%, var(--felt-700) 100%);
      color: var(--ivory);
      font-family: Georgia, "Times New Roman", serif;
      min-height: 100vh;
      display: grid; place-items: center;
    }
    main {
      text-align: center;
      padding: 32px;
      max-width: 640px;
    }
    h1 {
      font-size: clamp(3rem, 12vw, 5rem);
      color: var(--gold);
      margin: 0 0 .5rem;
      letter-spacing: 1px;
      text-shadow: 0 3px 0 rgba(0,0,0,.35);
    }
    .tag {
      color: var(--ivory-dim);
      font-size: 1.15rem;
      margin: 0 0 1.75rem;
      font-style: italic;
    }
    .suits {
      font-family: "DejaVu Sans", "Noto Sans", sans-serif;
      font-size: 2.4rem;
      letter-spacing: .8rem;
      margin: 0 0 2rem;
    }
    .suits .b { color: var(--gold); }
    .suits .r { color: var(--red); }
    a.cta {
      display: inline-block;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: .65rem 1.4rem;
      border-radius: 6px;
      text-decoration: none;
      letter-spacing: .5px;
      transition: background .15s;
    }
    a.cta:hover { background: rgba(200,162,75,.12); }
    footer { color: var(--ivory-dim); font-size: .85rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <main>
    <h1>Preferans</h1>
    <p class="tag">Classic Russian Card Game — for Android</p>
    <p class="suits">
      <span class="b">♠</span><span class="r">♥</span><span class="r">♦</span><span class="b">♣</span>
    </p>
    <p><a class="cta" href="privacy.html">Privacy Policy</a></p>
    <footer>© Boris Rayskiy · Intellectual Software Solutions</footer>
  </main>
</body>
</html>
